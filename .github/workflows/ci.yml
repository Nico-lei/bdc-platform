name: CI

# P0.1.3 阶段：骨架期最小 CI，作为 "CI 绿灯" 必检入口。
# P0.4.2 之后会扩展为：lint → 单测 → SonarQube → 依赖漏洞 → 镜像构建/扫描 → 推 Harbor。

on:
  push:
    branches: [main, dev, "release/**"]
  pull_request:
    branches: [main, dev]
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write   # PR 标题/评审 action 需要 write 才能反向标注失败原因
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Job 1：PR 标题 + Commit 标题 语义化校验（Conventional Commits）
  #
  # 说明：合并到一个 job，仅依赖 commitlint，不调用任何需要 GitHub App
  # integration scope 的 action，规避公共仓默认 GITHUB_TOKEN 受限带来的
  # "Resource not accessible by integration" 问题。
  # ---------------------------------------------------------------
  commitlint:
    name: PR / Commit 标题（Conventional Commits）
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 commitlint
        run: |
          npm install --no-save \
            @commitlint/cli@19 \
            @commitlint/config-conventional@19

      - name: 写入 commitlint 配置
        run: |
          cat > commitlint.config.cjs <<'EOF'
          // 注意：中文 subject 会被 commitlint 默认 subject-case 规则误判为 sentence-case，
          // 因此在中文项目中必须关闭 subject-case 规则。
          module.exports = {
            extends: ['@commitlint/config-conventional'],
            rules: {
              'type-enum': [2, 'always', [
                'feat','fix','docs','style','refactor','perf',
                'test','build','ci','chore','revert'
              ]],
              'scope-empty':       [2, 'never'],
              'subject-empty':     [2, 'never'],
              'subject-case':      [0],
              'subject-full-stop': [0],
              'body-max-line-length':   [0],
              'footer-max-line-length': [0],
              'header-max-length': [2, 'always', 120]
            }
          };
          EOF

      - name: 校验 PR 标题（Squash Merge 时即为最终 commit 标题）
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR 标题：$PR_TITLE"
          echo "$PR_TITLE" | npx commitlint --config commitlint.config.cjs

      - name: 校验 PR 中的所有 commit 标题
        run: |
          npx commitlint \
            --from=${{ github.event.pull_request.base.sha }} \
            --to=${{ github.event.pull_request.head.sha }} \
            --config commitlint.config.cjs

  # ---------------------------------------------------------------
  # Job 2：仓库结构与 YAML / JSON 文件健康检查
  # ---------------------------------------------------------------
  structure:
    name: 仓库结构 / YAML / JSON 校验
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 校验设计要求的关键路径存在
        shell: bash
        run: |
          set -e
          required=(
            "docs/README.md"
            "docs/01-总体架构/03-微服务拆分与服务清单.md"
            "docs/10-项目管理/02-开发任务计划.md"
            "settings.gradle.kts"
            "build.gradle.kts"
            "gradle.properties"
            "bdc-bom/build.gradle.kts"
            "bdc-gateway/build.gradle.kts"
            "bdc-gateway/Dockerfile"
            "bdc-frontend/package.json"
            "bdc-frontend/pnpm-workspace.yaml"
            "bdc-deploy/README.md"
            ".github/CODEOWNERS"
            ".github/PULL_REQUEST_TEMPLATE.md"
            ".github/COMMIT_CONVENTION.md"
          )
          for f in "${required[@]}"; do
            if [[ ! -e "$f" ]]; then
              echo "::error file=$f::缺失关键文件 $f"
              exit 1
            fi
          done
          echo "OK：${#required[@]} 个关键文件全部存在。"

      - name: 校验 19 个业务服务全部就位
        shell: bash
        run: |
          set -e
          services=(
            auth uac metadata mdm indicator tag
            collect warehouse govern push service-api
            market approval visual security audit notify
            scheduler-adapter file
          )
          missing=()
          for s in "${services[@]}"; do
            for f in build.gradle.kts Dockerfile README.md; do
              path="bdc-services/$s/$f"
              [[ -f "$path" ]] || missing+=("$path")
            done
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            printf '::error::缺失服务文件 %s\n' "${missing[@]}"
            exit 1
          fi
          echo "OK：19 个业务服务的 build.gradle.kts / Dockerfile / README.md 全部存在。"

      - name: YAML 语法校验（actions / dependabot / pnpm-workspace / OpenAPI 占位）
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              comments-indentation: disable
              indentation: { spaces: 2, indent-sequences: consistent }
              truthy: { allowed-values: ['true','false','on','off','yes','no'] }

      - name: JSON 语法校验（兼容含 BOM 的文件，但同时拦截非法 BOM）
        shell: bash
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            # 1) 用 utf-8-sig 解析（容忍 BOM）；解析失败 = 真错误
            python3 -c "import json; json.load(open('$f', encoding='utf-8-sig'))" || {
              echo "::error file=$f::JSON 解析失败"
              fail=1
              continue
            }
            # 2) 但同时按 RFC 8259 提示：JSON 不应含 BOM；命中则告警（不阻断）
            head -c 3 "$f" | od -An -tx1 | tr -d ' \n' | grep -qi '^efbbbf' && \
              echo "::warning file=$f::JSON 文件含 UTF-8 BOM，建议去除（RFC 8259 不允许 JSON 文本带 BOM）"
            true
          done < <(find . -name '*.json' -not -path './node_modules/*' -not -path './**/dist/*' -not -path './.git/*')
          exit $fail

  # ---------------------------------------------------------------
  # Job 3：密钥泄露扫描（gitleaks）
  # ---------------------------------------------------------------
  gitleaks:
    name: 密钥泄露扫描（gitleaks）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------
  # Job 4：大文件拦截（>10MB 直接 fail）
  # ---------------------------------------------------------------
  big-file:
    name: 大文件拦截（>10MB）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 检查
        shell: bash
        run: |
          set -e
          big=$(find . -type f -size +10M -not -path './.git/*' -not -path './node_modules/*' || true)
          if [[ -n "$big" ]]; then
            echo "::error::发现 >10MB 文件，禁止入库（应使用 Git LFS 或外部存储）："
            echo "$big"
            exit 1
          fi
          echo "OK：无 >10MB 文件。"

  # ---------------------------------------------------------------
  # Job 5：汇总（必检入口，分支保护规则只挂这一个，便于后续扩展时不必反复改保护规则）
  # ---------------------------------------------------------------
  ci-summary:
    name: CI 汇总（必检入口）
    runs-on: ubuntu-latest
    needs: [structure, gitleaks, big-file]
    if: always()
    steps:
      - name: 计算最终结果
        shell: bash
        run: |
          set -e
          # 在 push 事件中没有 commitlint 这个 job（只 PR 触发），因此只看 structure / gitleaks / big-file
          if [[ "${{ needs.structure.result }}"   != "success" ]] \
          || [[ "${{ needs.gitleaks.result }}"    != "success" ]] \
          || [[ "${{ needs.big-file.result }}"    != "success" ]]; then
            echo "::error::CI 子任务存在失败，分支保护应阻断合并。"
            exit 1
          fi
          echo "OK：CI 全部通过。"
